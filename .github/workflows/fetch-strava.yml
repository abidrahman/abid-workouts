name: Fetch Strava Activities

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit activities.json back to main

jobs:
  fetch:
    name: Fetch and commit activities
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch activities from Strava
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: node scripts/fetch-strava.mjs

      - name: Commit updated activities.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/activities.json
          git diff --cached --quiet || git commit -m "chore: update Strava activities [skip ci]"
          git push
